services:
  - type: web
    name: doctor-plus-clinic
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: CLINIC_DATA_PATH
        value: /var/data/clinic.json
    disk:
      name: doctor-plus-data
      mountPath: /var/data
      sizeGB: 1
